    <script>
        var JOTFORM_URL = 'https://form.jotform.com/260798369510063';
        var FALLBACK_MS = 1500;

        // Build destination URL, forwarding any UTM params from the current URL
        function buildDestination() {
            var sourceParams = new URLSearchParams(window.location.search);
            var destParams = new URLSearchParams();

            // Always tag this as a QR scan from a printed flyer
            destParams.set('utm_source', sourceParams.get('utm_source') || 'qr_code');
            destParams.set('utm_medium', sourceParams.get('utm_medium') || 'print');
            destParams.set('utm_campaign', sourceParams.get('utm_campaign') || 'atl_club_clash');

            // Forward any other UTM params that may be present
            ['utm_term', 'utm_content'].forEach(function(key) {
                if (sourceParams.get(key)) destParams.set(key, sourceParams.get(key));
            });

            return JOTFORM_URL + '?' + destParams.toString();
        }

        // Push custom event to dataLayer so GTM can record the QR scan
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({
            event: 'flyer_qr_scan',
            event_category: 'flyer',
            event_label: 'atl_club_clash_apply'
        });

        var redirected = false;
        function doRedirect() {
            if (redirected) return;
            redirected = true;
            window.location.replace(buildDestination());
        }

        // Redirect as soon as GTM's container finishes loading
        window.dataLayer.push({
            event: 'gtm.load',
            eventCallback: doRedirect,
            eventTimeout: FALLBACK_MS
        });

        // Fallback: redirect after FALLBACK_MS regardless
        setTimeout(doRedirect, FALLBACK_MS);
